<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <title>إنشاء حساب زبون</title>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow mx-auto" style="max-width: 500px;">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">إنشاء حساب جديد لصاحب محل</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">اسم المستخدم (User Name)</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">كلمة المرور</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">ربط الحساب بالمحل</label>
                        <select name="store_id" class="form-select" required>
                            {% for store in stores %}
                            <option value="{{ store.id }}">{{ store.name }} - {{ store.city }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success w-100">حفظ الحساب</button>
                    <a href="{{ url_for('admin_panel') }}" class="btn btn-secondary w-100 mt-2">رجوع</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
