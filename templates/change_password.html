<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تغيير كلمة المرور | لوحة التحكم</title>
    <style>
        :root {
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-panel: rgba(255, 255, 255, 0.03);
            --input-bg: rgba(0, 0, 0, 0.2);
            --text-bright: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-bright);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 20px; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        .password-card {
            background: var(--glass-panel);
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h2 { margin: 0; color: white; font-size: 24px; }
        .header p { color: var(--text-dim); font-size: 14px; margin-top: 10px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--accent-color); }

        .form-control {
            width: 100%;
            padding: 14px 20px;
            background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        .form-control:focus { outline: none; border-color: var(--accent-color); }

        .submit-btn {
            width: 100%; padding: 16px;
            background: var(--accent-color); color: white;
            border: none; border-radius: 16px;
            font-size: 16px; font-weight: 700;
            cursor: pointer; margin-top: 10px;
            transition: 0.3s;
        }

        .submit-btn:hover { background: var(--accent-hover); transform: translateY(-2px); }

        .flash-messages {
            margin-bottom: 20px;
            list-style: none;
            padding: 0;
        }
        .flash-item {
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .back-link {
            display: block; text-align: center; margin-top: 20px;
            color: var(--text-dim); text-decoration: none; font-size: 14px;
        }
    </style>
</head>
<body>

<div class="password-card">
    <div class="header">
        <h2>أمن الحساب</h2>
        <p>قم بتحديث كلمة المرور الخاصة بك بانتظام</p>
    </div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul class="flash-messages">
          {% for message in messages %}
            <li class="flash-item">{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        
        <div class="form-group">
            <label>🔑 كلمة المرور الحالية</label>
            <input type="password" name="current" class="form-control" required placeholder="••••••••">
        </div>

        <div class="form-group">
            <label>🆕 كلمة المرور الجديدة</label>
            <input type="password" name="new" class="form-control" required placeholder="••••••••">
        </div>

        <div class="form-group">
            <label>✅ تأكيد كلمة المرور</label>
            <input type="password" name="confirm" class="form-control" required placeholder="••••••••">
        </div>

        <button type="submit" class="submit-btn">تحديث كلمة المرور</button>
        <a href="{{ url_for('admin_panel') }}" class="back-link">← العودة للوحة التحكم</a>
    </form>
</div>

</body>
</html>
