<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <title>دخول أصحاب المحلات</title>
</head>
<body>
    <div class="container py-5">
        <div class="card shadow mx-auto" style="max-width: 400px;">
            <div class="card-body text-center">
                <h3 class="fw-bold mb-4"><i class="fas fa-store"></i> تسجيل دخول الزبون</h3>

                {% if error %}
                <div class="error-message">
                    <i class="fas fa-exclamation-triangle me-2"></i> {{ error }}
                </div>
                {% endif %}

                <form action="{{ url_for('customer_login') }}" method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    
                    <div class="mb-3">
                        <label class="form-label text-start w-100 fw-bold">اسم المحل (User Name)</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" name="username" class="form-control" placeholder="ادخل اسم المستخدم" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-start w-100 fw-bold">كلمة المرور</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" name="password" class="form-control" placeholder="ادخل كلمة المرور" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mt-3">دخول <i class="fas fa-sign-in-alt ms-2"></i></button>
                </form>

                <div class="mt-4">
                    <a href="{{ url_for('join_us') }}" class="text-decoration-none text-primary fw-bold">
                        <i class="fas fa-user-plus"></i> تسجيل متجر جديد
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
