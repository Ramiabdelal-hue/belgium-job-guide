<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <title>دخول أصحاب المحلات</title>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow mx-auto" style="max-width: 400px; border-radius: 20px;">
            <div class="card-body p-4 text-center">
                <h3 class="fw-bold mb-4">تسجيل دخول الزبون</h3>
                <form action="/customer-login" method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3 text-start">
                        <label class="small fw-bold">اسم المحل (User Name)</label>
                        <input type="text" name="username" class="form-control rounded-pill" required>
                    </div>
                    <div class="mb-3 text-start">
                        <label class="small fw-bold">كلمة المرور</label>
                        <input type="password" name="password" class="form-control rounded-pill" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 rounded-pill py-2"> دخول </button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
