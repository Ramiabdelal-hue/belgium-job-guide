{% extends "admin_layout.html" %} {% block content %}
<div style="padding: 20px;">
    <h2>طلبات الانضمام الجديدة</h2>
    <table border="1" style="width: 100%; border-collapse: collapse; background: white;">
        <thead style="background: #eee;">
            <tr>
                <th>اسم المحل</th>
                <th>المدينة</th>
                <th>الهاتف</th>
                <th>نوع المحل</th>
                <th>الإجراء</th>
            </tr>
        </thead>
        <tbody>
            {% for req in requests %}
            <tr>
                <td>{{ req.name }}</td>
                <td>{{ req.city }}</td>
                <td>{{ req.phone }}</td>
                <td>{{ req.type }}</td>
                <td>
                    <form action="{{ url_for('approve_request', req_id=req.id) }}" method="POST" style="display:inline;">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <button type="submit" style="background: green; color: white;">✅ موافقة وتفعيل</button>
                    </form>
                    <button style="background: red; color: white;">🗑️ رفض</button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
