<!DOCTYPE html>
<html lang="nl" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dalel Belgium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>

<div class="topbar">
    <div class="langs">
        <span onclick="changeLang('nl')" id="btn-nl">NL</span> | 
        <span onclick="changeLang('ar')" id="btn-ar">AR</span> | 
        <span onclick="changeLang('fr')" id="btn-fr">FR</span>
    </div>
</div>

<nav class="navbar">
    <div class="logo" onclick="showSection('home')" style="cursor: pointer; font-weight: bold; font-size: 18px; font-family: 'Poppins', sans-serif;">
        <span>🏠</span>
    </div>
    <div class="menu-btn" onclick="toggleMenu()">
        <div></div><div></div><div></div>
    </div>
    <div class="nav-links" id="menuLinks">
        <a onclick="navAction('market-section')" id="nav-market"></a>
        <a onclick="navAction('resturant-section')" id="nav-res"></a>
        <a onclick="navAction('kappers-section')" id="nav-kappers"></a>
        <a onclick="navAction('cars-section')" id="nav-cars"></a>
        <a onclick="navAction('newcomers-section')" id="nav-newcomers"></a>
        <a href="/about" id="nav-about"></a>
    </div>
</nav>

<div id="home" class="content-section active-section">
    <div class="hero">
        <h1 id="hero-title"></h1>
        <p id="hero-desc"></p>
        <a href="{{ url_for('join_us') }}" id="hero-cta" style="text-decoration: none;"></a>
    </div>
</div>

<div id="market-section" class="content-section">
    <h2 class="section-title" id="title-market"></h2>
    <div class="market-grid">
        <a href="{{ url_for('market') }}" style="text-decoration: none; color: inherit; display: block;">
            <div class="market-card"><span class="card-icon">🛒</span><h3 id="m-c1"></h3></div>
        </a>
        <a href="{{ url_for('slag') }}" style="text-decoration: none; color: inherit; display: block;">
            <div class="market-card"><span class="card-icon">🥩</span><h3 id="m-c2"></h3></div>
        </a>
        <a href="{{ url_for('sweets') }}" style="text-decoration: none; color: inherit; display: block;">
            <div class="market-card"><span class="card-icon">🧁</span><h3 id="m-c3"></h3></div>
        </a>
    </div>
</div>

<div id="resturant-section" class="content-section">
    <h2 class="section-title" id="title-res"></h2>
    <div class="market-grid">
        <a href="{{ url_for('resturant') }}" style="text-decoration: none; color: inherit; display: block;">
            <div class="market-card"><span class="card-icon">🥘</span><h3 id="r-c1"></h3></div>
        </a>
        <a href="{{ url_for('anderresturant') }}" style="text-decoration: none; color: inherit; display: block;">
            <div class="market-card"><span class="card-icon">🥗</span><h3 id="r-c3"></h3></div>
        </a>
    </div>
</div>

<div id="kappers-section" class="content-section">
    <h2 class="section-title" id="title-kappers"></h2>
    <div class="market-grid">
        <a href="{{ url_for('arabisch') }}" style="text-decoration: none; color: inherit; display: block;">
            <div class="market-card"><span class="card-icon">💈</span><h3 id="l-k1"></h3></div>
        </a>
        <a href="{{ url_for('turkish') }}" style="text-decoration: none; color: inherit; display: block;">
            <div class="market-card"><span class="card-icon">✂️</span><h3 id="l-k2"></h3></div>
        </a>
    </div>
</div>

<div id="cars-section" class="content-section">
    <h2 class="section-title" id="title-cars"></h2>
    <div class="market-grid">
        <a href="{{ url_for('garag') }}" style="text-decoration: none; color: inherit; display: block;">
            <div class="market-card"><span class="card-icon">🔧</span><h3 id="sub-c1"></h3></div>
        </a>
        <a href="{{ url_for('rijscholen') }}" style="text-decoration: none; color: inherit; display: block;">
            <div class="market-card"><span class="card-icon">🧑‍🏫</span><h3 id="sub-c2"></h3></div>
        </a>
        <a href="{{ url_for('taxi') }}" style="text-decoration: none; color: inherit; display: block;">
            <div class="market-card"><span class="card-icon">🚖</span><h3 id="sub-c3-taxi"></h3></div>
        </a>
    </div>
</div>

<div id="newcomers-section" class="content-section">
    <h2 style="text-align:center; margin-bottom:30px;" id="title-newcomers"></h2>
    <div id="main-newcomers-grid" class="market-grid">
        <a href="{{ url_for('verblijf') }}" style="text-decoration: none; color: inherit;">
            <div class="market-card"><span class="card-icon">📜</span><h3 id="n-c2"></h3></div>
        </a>
        <a href="{{ url_for('lawyer') }}" style="text-decoration: none; color: inherit;">
            <div class="market-card"><span class="card-icon">⚖️</span><h3 id="n-s1"></h3></div>
        </a>
        <a href="{{ url_for('translate') }}" style="text-decoration: none; color: inherit;">
            <div class="market-card"><span class="card-icon">📄</span><h3 id="n-s2"></h3></div>
        </a>
        <a href="{{ url_for('werk') }}" style="text-decoration: none; color: inherit;">
            <div class="market-card"><span class="card-icon">💼</span><h3 id="n-c3"></h3></div>
        </a>
        <a href="{{ url_for('taal') }}" style="text-decoration: none; color: inherit;">
            <div class="market-card"><span class="card-icon">🗣</span><h3 id="n-c4"></h3></div>
        </a>
    </div>
</div>

<div id="ads-section" class="content-section"><h2 id="title-ads" class="section-title"></h2></div>
<div id="others-section" class="content-section"><h2 id="title-others" class="section-title"></h2></div>

<div class="ticker"><marquee id="tick-text"></marquee></div>

<script src="static/js/index.js"></script>
</body>
</html>
