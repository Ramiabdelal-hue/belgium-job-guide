<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>إدارة المستخدمين</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
body { font-family: Arial, sans-serif; background: #f4f6f9; padding: 20px; }
h2 { text-align: center; margin-bottom: 20px; }
.search-box { max-width: 400px; margin: auto; margin-bottom: 20px; display:flex; gap:10px; }
.search-box input { flex:1; padding:8px; border-radius:5px; border:1px solid #ccc; }
.search-box button { padding:8px 15px; border:none; border-radius:5px; background:#3498db; color:white; cursor:pointer; }

table { width: 100%; border-collapse: collapse; background: #fff; box-shadow:0 0 10px rgba(0,0,0,0.05); }
th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
th { background: #f4f4f4; }
.edit-btn { background: #3498db; color: white; padding:5px 10px; border:none; border-radius:5px; cursor:pointer; }
.delete-btn { background: #e74c3c; color: white; padding:5px 10px; border:none; border-radius:5px; cursor:pointer; }
a { text-decoration: none; }
</style>
</head>
<body>

<h2>لوحة إدارة المستخدمين</h2>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="بحث باسم المستخدم أو المتجر...">
    <button onclick="searchUsers()"><i class="fa fa-search"></i></button>
</div>

<table id="usersTable">
    <thead>
        <tr>
            <th>#</th>
            <th>اسم المستخدم</th>
            <th>البريد الإلكتروني</th>
            <th>المتجر المرتبط</th>
            <th>الإجراءات</th>
        </tr>
    </thead>
    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ loop.index }}</td>
            <td class="username">{{ user.username }}</td>
            <td class="email">{{ user.email | default('-') }}</td>
            <td class="store">{{ user.store.name if user.store else "-" }}</td>
            <td>
                <a href="{{ url_for('edit_user', user_id=user.id) }}"><button class="edit-btn"><i class="fa fa-edit"></i> تعديل</button></a>
			<form action="{{ url_for('delete_user', user_id=user.id) }}" method="POST" style="display:inline;" 
				  onsubmit="return confirm('هل أنت متأكد من حذف هذا المستخدم؟');">
				<!-- CSRF token -->
				<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
				<button class="delete-btn"><i class="fa fa-trash"></i> حذف</button>
			</form>

            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<a href="{{ url_for('create_customer') }}"><button style="margin-top:20px; background:#2ecc71; color:white; padding:10px 15px; border:none; border-radius:5px; cursor:pointer;"><i class="fa fa-plus"></i> إضافة مستخدم جديد</button></a>

<script>
// ================== البحث المباشر ==================
function searchUsers() {
    let input = document.getElementById('searchInput').value.toLowerCase();
    let table = document.getElementById('usersTable');
    let trs = table.getElementsByTagName('tr');

    for (let i = 1; i < trs.length; i++) { // بدءًا من 1 لتجاهل الـ header
        let username = trs[i].querySelector('.username').innerText.toLowerCase();
        let store = trs[i].querySelector('.store').innerText.toLowerCase();
        if(username.includes(input) || store.includes(input)){
            trs[i].style.display = '';
        } else {
            trs[i].style.display = 'none';
        }
    }
}
</script>

</body>
</html>
