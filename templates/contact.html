<!DOCTYPE html>
<html lang="nl" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - المنصة العربية</title>
 <link rel="stylesheet" href="{{ url_for('static', filename='css/contact.css') }}">
</head>
<body>

<div class="contact-card">
    <div class="langs">
        <span onclick="setLanguage('nl')">NL</span>
        <span onclick="setLanguage('ar')">AR</span>
        <span onclick="setLanguage('fr')">FR</span>
    </div>

    <h2 id="form-title">Contacteer ons</h2>

    <form action="https://formspree.io/f/xvzgebbe" method="POST" id="contact-form">
        
        <div class="form-group">
            <label id="label-name">🏷️ Naam / الاسم</label>
            <input type="text" name="name" id="input-name" required placeholder="Jouw naam...">
        </div>

        <div class="form-group">
            <label id="label-email">📧 Email / البريد</label>
            <input type="email" name="_replyto" id="input-email" required placeholder="email@example.com">
        </div>

        <div class="form-group">
            <label id="label-message">📝 Bericht / الرسالة</label>
            <textarea name="message" id="input-message" style="height: 120px;" required placeholder="Hoe kunnen we helpen?"></textarea>
        </div>

        <input type="hidden" name="_language" id="form-lang" value="nl">

        <button type="submit" class="submit-btn" id="btn-submit">Verzenden / إرسال</button>
    </form>

    <p style="text-align: center; margin-top: 20px;">
        <a href="{{ url_for('index') }}" style="color: white; text-decoration: none; font-size: 14px; opacity: 0.6;">⬅ Terug naar homepage</a>
    </p>
</div>

<script src="./static/js/contact.js"></script>

</body>
</html>
